<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code สำหรับลูกค้า</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center mt-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="card-title mb-3">QR Code สำหรับคุณ {{ customer_name }}</h2>
                        <p class="text-muted">
                            สำหรับงาน: <strong>{{ task.title }}</strong>
                        </p>
                        <hr>
                        <p>
                            กรุณาใช้แอปพลิเคชัน LINE สแกน QR Code นี้<br>เพื่อติดตามสถานะงาน หรือให้ข้อมูลเพิ่มเติมกับทางร้าน
                        </p>
                        <img src="{{ qr_code_base64 }}" alt="QR Code" class="img-fluid my-3" style="max-width: 300px; border: 1px solid #ddd; padding: 10px; border-radius: 8px;">
                        
                        <div>
                           <button onclick="window.print();" class="btn btn-secondary mt-3"><i class="fas fa-print me-2"></i>พิมพ์ QR Code</button>
                           <button onclick="window.close();" class="btn btn-outline-danger mt-3">ปิดหน้าต่าง</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
