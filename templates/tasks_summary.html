<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>📊 สรุปงานรายวัน</title>
    <style>
        body { font-family: 'Prompt', sans-serif; max-width: 800px; margin: 2rem auto; background: #f9f9f9; padding: 2rem; border-radius: 10px;}
        h2 { margin-bottom: 1rem; }
        .task { background: #fff; padding: 1rem; margin-bottom: 1rem; border-radius: 10px; border-left: 5px solid #007bff; cursor: pointer;}
        .details { display: none; margin-top: 10px; }
        .task:hover { background: #eef3ff; }
    </style>
</head>
<body>
    <h2>📊 รายการงานประจำวันที่ {{ request.args.get('date') }}</h2>
    {% for task in tasks %}
        <div class="task" onclick="toggleDetail('{{ task.id }}')">
            <strong>{{ task.title }}</strong> - {{ task.status }} <br> 👷 {{ task.technician }}
            <div class="details" id="detail-{{ task.id }}"></div>
        </div>
    {% endfor %}
    <script>
        function toggleDetail(taskId) {
            const detailBox = document.getElementById("detail-" + taskId);
            if (detailBox.innerHTML === "") {
                fetch("/task/" + taskId)
                .then(r => r.json())
                .then(data => {
                    detailBox.innerHTML = "<p>" + data.description + "</p>";
                    detailBox.style.display = "block";
                });
            } else {
                detailBox.innerHTML = "";
                detailBox.style.display = "none";
            }
        }
    </script>
</body>
</html>
