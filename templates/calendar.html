{% extends "base.html" %}

{% block title %}ปฏิทินงาน{% endblock %}

{% block head_extra %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.14/main.min.css' rel='stylesheet' />
<style>
    #calendar {
        max-width: 1100px;
        margin: 0 auto;
    }
    .fc-event {
        cursor: pointer;
    }
    .fc-event-main {
        font-size: 0.85em;
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2">🗓️ ปฏิทินงาน</h1>
    <a href="{{ url_for('summary') }}" class="btn btn-secondary"><i class="fas fa-list-check me-2"></i>กลับหน้าสรุป</a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-4">
        <div id='calendar'></div>
    </div>
</div>
{% endblock %}

{% block body_extra %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.14/main.min.js'></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'th', // Set locale to Thai
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,listWeek'
      },
      events: '{{ url_for("api_calendar_tasks") }}',
      eventTimeFormat: {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      },
      // You can enable drag-and-drop later by uncommenting the 'editable' and 'eventDrop' properties
      // editable: true, 
      // eventDrop: function(info) {
      //   //
      //   // This function is triggered when an event is dragged and dropped.
      //   // You would add an AJAX request here to send the new date to your backend.
      //   //
      //   if (!confirm("คุณต้องการย้ายนัดหมายนี้ไปที่ " + info.event.start.toLocaleString() + " หรือไม่?")) {
      //     info.revert();
      //   } else {
      //      console.log("Task ID: ", info.event.id);
      //      console.log("New Date: ", info.event.start.toISOString());
      //      // TODO: Send AJAX POST to backend to update the task
      //   }
      // }
    });
    calendar.render();
  });
</script>
{% endblock %}
