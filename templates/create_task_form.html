<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างงานใหม่</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); max-width: 600px; margin: auto; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="tel"], input[type="datetime-local"], textarea { 
            width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; 
        }
        input[type="submit"] { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        input[type="submit"]:hover { background-color: #0056b3; }
        h1 { color: #333; text-align: center; margin-bottom: 20px;}
        .button-group { text-align: center; margin-top: 20px; }
        .button-group a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 0 10px;
        }
        .button-group a:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>สร้างงานใหม่</h1>
        <form method="POST">
            <input type="hidden" name="command_type" value="create_task">
            
            <label for="title">หัวข้อ (Topic):</label>
            <input type="text" id="title" name="title" required>

            <label for="customer_name">ชื่อลูกค้า:</label>
            <input type="text" id="customer_name" name="customer_name">

            <label for="customer_phone">เบอร์โทรศัพท์ลูกค้า:</label>
            <input type="tel" id="customer_phone" name="customer_phone">

            <label for="due_date">กำหนดส่ง (YYYY-MM-DD HH:MM):</label>
            <input type="datetime-local" id="due_date" name="due_date">

            <label for="location">สถานที่:</label>
            <input type="text" id="location" name="location">

            <input type="submit" value="สร้างงาน">
        </form>
        <div class="button-group">
            <a href="{{ url_for('summary') }}">ดูสรุปงานทั้งหมด</a>
        </div>
    </div>
</body>
</html>
