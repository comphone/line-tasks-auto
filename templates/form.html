{% extends "base.html" %}

{% block title %}สร้างงานใหม่{% endblock %}

{% block head_extra %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://unpkg.com/tributejs@5.1.3/dist/tribute.css" />
    <style>
        .card-header h5 { font-weight: 600; }
        .input-group-text { width: 42px; justify-content: center; }
        .autocomplete-container { position: relative; }
        .autocomplete-items {
            position: absolute; border: 1px solid #d4d4d4;
            border-bottom: none; border-top: none; z-index: 99;
            top: 100%; left: 0; right: 0; background-color: #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 0 0 .375rem .375rem;
        }
        .autocomplete-items div { padding: 10px; cursor: pointer; background-color: #fff; border-bottom: 1px solid #d4d4d4; }
        .autocomplete-items div:hover { background-color: #e9e9e9; }
        .autocomplete-active { background-color: DodgerBlue !important; color: #ffffff; }
        .autocomplete-item-name { font-weight: 500; }
        .autocomplete-item-details { font-size: 0.85em; color: #6c757d; }
        .tribute-container { z-index: 9999; }
        .tribute-container ul { list-style-type: none; padding: 0; margin: 0; }
        .tribute-container li { padding: 5px 10px; cursor: pointer; }
        .tribute-container li.highlight { background-color: #0d6efd; color: white; }
    </style>
{% endblock %}


{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10 col-md-12">
        <form id="createTaskForm" class="needs-validation" novalidate enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="hidden" name="uploaded_attachments_json" id="uploaded_attachments_json" value="[]">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 mb-0">📝 สร้างงานใหม่</h1>
                <a href="{{ url_for('summary') }}" class="btn btn-secondary"><i class="fas fa-arrow-left me-2"></i>กลับหน้าสรุป</a>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-header"><h5 class="mb-0"><i class="fas fa-user-tag me-2"></i>ข้อมูลลูกค้าและแผนที่</h5></div>
                <div class="card-body p-4">
                    </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-header"><h5 class="mb-0"><i class="fas fa-clipboard-list me-2"></i>รายละเอียดงานและนัดหมาย</h5></div>
                <div class="card-body p-4">
                    </div>
            </div>

            <div class="d-flex align-items-center">
                <button type="submit" class="btn btn-primary btn-lg flex-grow-1"><i class="fas fa-save me-2"></i>บันทึกงาน</button>
                <div id="upload-status" class="ms-3" style="display:none; font-weight: 500;"></div>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block body_extra %}
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <script src="https://unpkg.com/tributejs@5.1.3/dist/tribute.min.js"></script>
    
    <script id="form-data" 
            data-csrf-token="{{ csrf_token() }}"
            data-customers-api-url="{{ url_for('api_customers') }}"
            data-form-action-url="{{ url_for('form_page') }}"
            data-upload-api-url="{{ url_for('api_upload_attachment') }}"
            data-snippets='{{ task_detail_snippets | tojson | safe }}'>
    </script>

    <script src="{{ url_for('static', filename='js/form.js') }}"></script>
{% endblock %}
