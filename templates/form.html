
{% extends "base.html" %}
{% block title %}บันทึก Task{% endblock %}
{% block head_extra %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
{% endblock %}
{% block content %}
<div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">บันทึก Task ใหม่</h4>
    </div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="topic" class="form-label">หัวข้อ <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="topic" name="topic" required>
            </div>
            <div class="mb-3">
                <label for="customer" class="form-label">ชื่อลูกค้า</label>
                <input type="text" class="form-control" id="customer" name="customer">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">เบอร์โทรศัพท์</label>
                <input type="tel" class="form-control" id="phone" name="phone">
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">ที่อยู่</label>
                <textarea class="form-control" id="address" name="address" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="appointment" class="form-label">วันเวลาที่นัดหมาย</label>
                <input type="text" class="form-control datetimepicker" id="appointment" name="appointment">
            </div>
            <div class="mb-3">
                <label for="coord" class="form-label">พิกัด (ละติจูด, ลองจิจูด หรือ URL Google Maps)</label>
                <input type="text" class="form-control" id="coord" name="latitude_longitude" placeholder="เช่น 13.7563,100.5018 หรือ https://maps.app.goo.gl/..." oninput="extractCoords(this.value)">
                <input type="hidden" id="latitude" name="latitude">
                <input type="hidden" id="longitude" name="longitude">
                <div id="coordHelp" class="form-text">ระบบจะพยายามแยกพิกัดจาก URL Google Maps โดยอัตโนมัติ</div>
            </div>
            <div class="mb-3">
                <label for="detail" class="form-label">รายละเอียดเพิ่มเติม</label>
                <textarea class="form-control" id="detail" name="detail" rows="5"></textarea>
            </div>
            <div class="mb-3">
                <label for="attachment" class="form-label">แนบรูปภาพ/ไฟล์</label>
                <input class="form-control" type="file" id="attachment" name="attachment" accept="image/*,.pdf">
                <div id="fileHelp" class="form-text">รองรับ .png, .jpg, .jpeg, .gif, .pdf</div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>บันทึก Task</button>
        </form>
    </div>
</div>
{% endblock %}
{% block body_extra %}
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr(".datetimepicker", {
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                altInput: true,
                altFormat: "d M Y H:i",
                locale: "th",
            });
        });
        function extractCoords(input) {
            let latitudeInput = document.getElementById('latitude');
            let longitudeInput = document.getElementById('longitude');
            const mapUrlRegex = /(?:@(-?\d+\.\d+),(-?\d+\.\d+))|(?:\/maps\/place\/(?:[^/]+\/)?@(-?\d+\.\d+),(-?\d+\.\d+))/;
            const match = input.match(mapUrlRegex);
            if (match) {
                if (match[1] && match[2]) {
                    latitudeInput.value = match[1];
                    longitudeInput.value = match[2];
                } else if (match[3] && match[4]) {
                    latitudeInput.value = match[3];
                    longitudeInput.value = match[4];
                }
            } else {
                const parts = input.split(',');
                if (parts.length === 2) {
                    latitudeInput.value = parseFloat(parts[0].trim());
                    longitudeInput.value = parseFloat(parts[1].trim());
                } else {
                    latitudeInput.value = '';
                    longitudeInput.value = '';
                }
            }
        }
    </script>
{% endblock %}
