<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฟอร์มแจ้งงาน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
  <h2 class="mb-4">ฟอร์มแจ้งงานช่าง</h2>
  <form method="post" action="/submit" enctype="multipart/form-data">
    <div class="mb-2">
      <label class="form-label">หัวข้องาน</label>
      <input name="topic" class="form-control" required>
    </div>
    <div class="mb-2">
      <label class="form-label">ชื่อลูกค้า</label>
      <input name="customer" class="form-control" required>
    </div>
    <div class="mb-2">
      <label class="form-label">เบอร์โทร</label>
      <input name="phone" class="form-control" required>
    </div>
    <div class="mb-2">
      <label class="form-label">ที่อยู่</label>
      <input name="address" class="form-control" required>
    </div>
    <div class="mb-2">
      <label class="form-label">เวลานัดหมาย</label>
      <input name="datetime" type="datetime-local" class="form-control" required>
    </div>
    <div class="mb-2">
      <label class="form-label">แชร์พิกัด</label>
      <input name="location" class="form-control" placeholder="เช่น https://maps.app.goo.gl/..." required>
    </div>
    <div class="mb-2">
      <label class="form-label">รายละเอียดงาน</label>
      <textarea name="detail" class="form-control" rows="3"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">แนบรูปภาพ</label>
      <input type="file" name="file" accept="image/*" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary w-100">ส่งงาน</button>
  </form>
</div>
</body>
</html>
