
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มงานบริการ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
    <h2>บันทึกงานบริการ</h2>
    <form action="/" method="post" enctype="multipart/form-data">
        <input type="text" name="topic" placeholder="หัวข้องาน" required>
        <input type="text" name="customer" placeholder="ชื่อลูกค้า" required>
        <input type="text" name="phone" placeholder="เบอร์โทร" required>
        <input type="text" name="address" placeholder="ที่อยู่" required>
        <input type="datetime-local" name="appointment" required>
        <input type="text" name="latitude" placeholder="Latitude">
        <input type="text" name="longitude" placeholder="Longitude">
        <textarea name="detail" placeholder="รายละเอียดงาน" rows="3"></textarea>
        <input type="file" name="attachment">
        <button type="submit">ส่งข้อมูล</button>
    </form>
</div>
</body>
</html>
