{% extends "base.html" %}

{% block title %}สร้างงานใหม่{% endblock %}

{% block head_extra %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            opacity: .65;
            transform: scale(.85) translateY(-.5rem) translateX(.15rem);
        }
        .form-floating > label {
            padding: 1rem .75rem;
        }
    </style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="mb-4 text-center">สร้างงานใหม่</h1>

        <form method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-user-circle me-2"></i>ข้อมูลหลัก</h5>
                </div>
                <div class="card-body p-4">
                    <!-- ใช้ Form Floating เพื่อความสวยงามบนมือถือ -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="customer" name="customer" placeholder="ชื่อลูกค้า" required>
                        <label for="customer">ชื่อลูกค้า <span class="text-danger">*</span></label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="เบอร์โทรศัพท์">
                        <label for="phone">เบอร์โทรศัพท์</label>
                    </div>
                    <div class="form-floating mb-3">
                        <textarea class="form-control" id="detail" name="detail" placeholder="รายละเอียดงาน" style="height: 100px" required></textarea>
                        <label for="detail">รายละเอียดงาน <span class="text-danger">*</span></label>
                    </div>
                </div>
            </div>

            <!-- Accordion for optional fields -->
            <div class="accordion mt-3" id="optionalFieldsAccordion">
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingOne">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                            <i class="fas fa-plus-circle me-2"></i> เพิ่มข้อมูลอื่นๆ (ที่อยู่, นัดหมาย, พิกัด, ไฟล์)
                        </button>
                    </h2>
                    <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="headingOne" data-bs-parent="#optionalFieldsAccordion">
                        <div class="accordion-body">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control datetimepicker" id="appointment" name="appointment" placeholder="เลือกวันและเวลา">
                                <label for="appointment">วันเวลานัดหมาย</label>
                            </div>
                            <div class="form-floating mb-3">
                                <textarea class="form-control" id="address" name="address" placeholder="ที่อยู่ลูกค้า" style="height: 80px"></textarea>
                                <label for="address">ที่อยู่ลูกค้า</label>
                            </div>
                            <div class="mb-3">
                                <label for="latitude_longitude" class="form-label">พิกัดแผนที่</label>
                                <div class="input-group">
                                    <input type="url" class="form-control" id="latitude_longitude" name="latitude_longitude" placeholder="กดปุ่มเพื่อแชร์ตำแหน่ง...">
                                    <button class="btn btn-outline-info" type="button" id="shareLocationBtn" title="แชร์ตำแหน่งปัจจุบัน">
                                        <i class="fas fa-location-arrow"></i>
                                    </button>
                                </div>
                                <small class="form-text text-muted" id="shareLocationStatus"></small>
                            </div>
                            <div class="mb-3">
                                <label for="files" class="form-label">แนบไฟล์</label>
                                <input class="form-control" type="file" id="files" name="files[]" multiple>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Floating Save Button -->
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i>บันทึกงาน</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block body_extra %}
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Flatpickr for date-time selection
            flatpickr(".datetimepicker", {
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                locale: "th",
            });

            // Geolocation script
            const shareBtn = document.getElementById('shareLocationBtn');
            const locationInput = document.getElementById('latitude_longitude');
            const statusText = document.getElementById('shareLocationStatus');

            if (shareBtn) {
                shareBtn.addEventListener('click', function() {
                    statusText.textContent = 'กำลังค้นหาตำแหน่ง...';
                    statusText.classList.remove('text-success', 'text-danger');
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const lat = position.coords.latitude;
                                const lon = position.coords.longitude;
                                locationInput.value = `https://www.google.com/maps?q=${lat},${lon}`;
                                statusText.textContent = `ใส่ตำแหน่งปัจจุบันสำเร็จ!`;
                                statusText.classList.add('text-success');
                            },
                            (error) => {
                                console.error("Geolocation Error: ", error);
                                statusText.textContent = 'ไม่สามารถดึงตำแหน่งได้ (โปรดอนุญาตการเข้าถึง)';
                                statusText.classList.add('text-danger');
                            }
                        );
                    } else {
                        statusText.textContent = 'เบราว์เซอร์ไม่รองรับ Geolocation';
                        statusText.classList.add('text-danger');
                    }
                });
            }

            // Bootstrap form validation
            const forms = document.querySelectorAll('.needs-validation');
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        });
    </script>
{% endblock %}
