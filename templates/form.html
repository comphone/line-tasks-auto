<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกงานใหม่</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .container { max-width: 700px; }
        .card-header { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">บันทึกงานใหม่</h4>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="customer" class="form-label"><strong>ชื่อลูกค้า</strong> <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="customer" name="customer" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">เบอร์โทรศัพท์</label>
                            <input type="tel" class="form-control" id="phone" name="phone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="appointment" class="form-label">วันเวลานัดหมาย (ถ้ามี)</label>
                            <input type="text" class="form-control datetimepicker" id="appointment" name="appointment" placeholder="เลือกวันและเวลา">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">ที่อยู่ลูกค้า</label>
                        <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="coord" class="form-label">พิกัดแผนที่ (วาง URL จาก Google Maps)</label>
                        <input type="text" class="form-control" id="coord" name="latitude_longitude" placeholder="เช่น https://maps.app.goo.gl/..." oninput="extractCoords(this.value)">
                        <input type="hidden" id="latitude" name="latitude">
                        <input type="hidden" id="longitude" name="longitude">
                    </div>
                    <div class="mb-3">
                        <label for="detail" class="form-label">รายละเอียดงาน</label>
                        <textarea class="form-control" id="detail" name="detail" rows="4"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="attachments" class="form-label">แนบรูปภาพ/ไฟล์ (ได้หลายไฟล์)</label>
                        <input class="form-control" type="file" id="attachments" name="attachments" multiple>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{{ url_for('summary') }}" class="btn btn-secondary">ดูสรุปงาน</a>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>บันทึกงาน</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr(".datetimepicker", {
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                locale: "th",
            });
        });

        function extractCoords(input) {
            let latInput = document.getElementById('latitude');
            let lngInput = document.getElementById('longitude');
            const mapUrlRegex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
            const match = input.match(mapUrlRegex);
            if (match) {
                latInput.value = match[1];
                lngInput.value = match[2];
            }
        }
    </script>
</body>
</html>
