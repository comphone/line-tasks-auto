<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .line-logo {
            width: 80px;
            margin-bottom: 1.5rem;
        }
        .btn-line-login {
            background-color: #00C300;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-line-login:hover {
            background-color: #00B000;
            color: white; /* Ensure text color remains white on hover */
        }
        .btn-line-login i {
            margin-right: 0.75rem;
        }
        .alert {
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="line-logo">
        <h2 class="mb-4">เข้าสู่ระบบ</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <button id="line-login-button" class="btn btn-line-login" style="display: none;">
            <i class="fab fa-line"></i> ล็อกอินด้วย LINE
        </button>
        <p id="loading-message" class="text-muted">กำลังตรวจสอบสถานะการล็อกอิน...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const liffId = "{{ LIFF_ID_FORM }}"; 

        document.addEventListener('DOMContentLoaded', function() {
            const loginButton = document.getElementById('line-login-button');
            const loadingMessage = document.getElementById('loading-message');

            if (!liffId || liffId === 'None' || liffId === '') {
                console.error('LIFF ID is not set or is invalid. Using Flask-generated login URL as fallback.');
                loadingMessage.style.display = 'none';
                loginButton.style.display = 'block';
                loginButton.onclick = function() {
                    window.location.href = "{{ line_login_url }}"; 
                };
                loginButton.textContent = "ล็อกอินด้วย LINE (Fallback)";
                return;
            }

            liff.init({ liffId: liffId })
                .then(() => {
                    console.log('LIFF init success');
                    loadingMessage.style.display = 'none'; 
                    if (liff.isLoggedIn()) {
                        console.log('User is already logged in via LIFF. Redirecting to summary...');
                        // ✅ แก้ไข: เพิ่ม 'liff.' เข้าไปใน url_for
                        window.location.href = "{{ url_for('liff.summary') }}"; 
                    } else {
                        console.log('User is not logged in via LIFF. Show login button.');
                        loginButton.style.display = 'block'; 
                        loginButton.addEventListener('click', function() {
                            liff.login(); 
                        });
                    }
                })
                .catch((err) => {
                    console.error('LIFF init failed', err);
                    loadingMessage.style.display = 'none';
                    loginButton.style.display = 'block';
                    loginButton.onclick = function() {
                        window.location.href = "{{ line_login_url }}"; 
                    };
                    loginButton.textContent = "ล็อกอินด้วย LINE (LIFF Error)";
                });
        });
    </script>
</body>
</html>
