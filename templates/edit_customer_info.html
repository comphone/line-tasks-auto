{% extends "base.html" %}

{% block title %}แก้ไขข้อมูลลูกค้า{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="mb-4 text-center">แก้ไขข้อมูลลูกค้า</h1>
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <i class="fas fa-user-edit me-2"></i>แก้ไขข้อมูลสำหรับงาน: {{ task.title }}
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('edit_customer_info', task_id=task.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="customer_name" class="form-label"><strong><i class="fas fa-user me-2"></i>ชื่อลูกค้า</strong></label>
                        <input type="text" class="form-control" id="customer_name" name="customer_name" value="{{ task.customer.name or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="customer_phone" class="form-label"><strong><i class="fas fa-phone me-2"></i>เบอร์โทรศัพท์</strong></label>
                        <input type="tel" class="form-control" id="customer_phone" name="customer_phone" value="{{ task.customer.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <!-- CHANGED: Unified the label to match the main form -->
                        <label for="address" class="form-label"><strong><i class="fas fa-home me-2"></i>ที่อยู่ลูกค้า</strong></label>
                        <textarea class="form-control" id="address" name="address" rows="3">{{ task.customer.address or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="detail" class="form-label"><strong><i class="fas fa-info-circle me-2"></i>รายละเอียด/อาการเบื้องต้น (จากลูกค้า)</strong></label>
                        <textarea class="form-control" id="detail" name="detail" rows="4">{{ task.customer.detail or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="latitude_longitude" class="form-label"><strong><i class="fas fa-map-marked-alt me-2"></i>พิกัดแผนที่</strong></label>
                        <div class="input-group">
                             <input type="url" class="form-control" id="latitude_longitude" name="latitude_longitude" value="{{ task.customer.map_url or '' }}" placeholder="กดปุ่มเพื่อแชร์ตำแหน่งปัจจุบัน หรือวาง URL">
                             <button class="btn btn-outline-info" type="button" id="shareLocationBtn" title="แชร์ตำแหน่งปัจจุบัน"><i class="fas fa-location-arrow"></i></button>
                        </div>
                        <small class="form-text text-muted" id="shareLocationStatus">กดปุ่มเพื่อใส่ลิงก์ Google Maps ของตำแหน่งคุณ</small>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('update_task_details', task_id=task.id) }}" class="btn btn-secondary"><i class="fas fa-times me-1"></i>ยกเลิก</a>
                        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>บันทึกข้อมูลลูกค้า</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block body_extra %}
    <script>
        // This script handles sharing the user's current geolocation.
        document.addEventListener('DOMContentLoaded', function() {
            const shareBtn = document.getElementById('shareLocationBtn');
            const locationInput = document.getElementById('latitude_longitude');
            const statusText = document.getElementById('shareLocationStatus');

            if (shareBtn) {
                shareBtn.addEventListener('click', function() {
                    statusText.textContent = 'กำลังค้นหาตำแหน่ง...';
                    statusText.classList.remove('text-success', 'text-danger');
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const lat = position.coords.latitude;
                                const lon = position.coords.longitude;
                                locationInput.value = `https://www.google.com/maps?q=${lat},${lon}`;
                                statusText.textContent = `ใส่ตำแหน่งปัจจุบันสำเร็จ!`;
                                statusText.classList.add('text-success');
                            },
                            (error) => {
                                console.error("Geolocation Error: ", error);
                                statusText.textContent = 'ไม่สามารถดึงตำแหน่งได้ (โปรดอนุญาตการเข้าถึง)';
                                statusText.classList.add('text-danger');
                            }
                        );
                    } else {
                        statusText.textContent = 'เบราว์เซอร์ไม่รองรับ Geolocation';
                        statusText.classList.add('text-danger');
                    }
                });
            }
        });
    </script>
{% endblock %}
