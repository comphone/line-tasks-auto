<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขข้อมูลลูกค้า</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">แก้ไขข้อมูลลูกค้าและวันนัดหมาย</h1>
        
        <div class="card">
            <div class="card-header">
                ชื่องาน: {{ task.title }}
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_customer_info', task_id=task.id) }}" method="POST">
                    <div class="form-group">
                        <label for="customer_name"><strong>ชื่อลูกค้า</strong></label>
                        <input type="text" class="form-control" id="customer_name" name="customer_name" value="{{ task.customer.name or '' }}" required>
                    </div>

                    <div class="form-group">
                        <label for="customer_phone"><strong>เบอร์โทรศัพท์</strong></label>
                        <input type="tel" class="form-control" id="customer_phone" name="customer_phone" value="{{ task.customer.phone or '' }}">
                    </div>

                    <div class="form-group">
                        <label for="address"><strong>ที่อยู่</strong></label>
                        <textarea class="form-control" id="address" name="address" rows="3">{{ task.customer.address or '' }}</textarea>
                    </div>

                    <div class="form-group">
                        <label for="latitude_longitude"><strong>พิกัดแผนที่ (Google Maps URL)</strong></label>
                        <input type="url" class="form-control" id="latitude_longitude" name="latitude_longitude" value="{{ task.customer.map_url or '' }}" placeholder="https://www.google.com/maps?q=...">
                        <small class="form-text text-muted">เพื่อให้ทีมช่างเดินทางไปได้ถูกต้อง</small>
                    </div>

                    <div class="form-group">
                        <label for="detail"><strong>รายละเอียดงานเพิ่มเติม</strong></label>
                        <textarea class="form-control" id="detail" name="detail" rows="4">{{ task.customer.detail or '' }}</textarea>
                    </div>

                    <div class="form-group">
                        <label for="appointment_due"><strong>เลื่อนวันนัดหมายใหม่</strong></label>
                        <input type="datetime-local" class="form-control" id="appointment_due" name="appointment_due" value="{{ task.due_for_input }}">
                        <small class="form-text text-muted">กำหนดวัน-เวลาที่ต้องการนัดหมายใหม่ หากไม่ต้องการเปลี่ยน ให้เว้นว่างไว้</small>
                    </div>

                    <hr>
                    
                    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> บันทึกการเปลี่ยนแปลง</button>
                    <a href="{{ url_for('update_task_details', task_id=task.id) }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> ยกเลิก
                    </a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
