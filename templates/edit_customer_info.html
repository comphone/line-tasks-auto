<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขข้อมูลลูกค้า</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .container { max-width: 700px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="mb-1">แก้ไขข้อมูลลูกค้า</h1>
            <p class="text-muted">สำหรับงาน: {{ task.title }}</p>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('edit_customer_info', task_id=task.id) }}">
                    <div class="mb-3">
                        <label for="customer_name" class="form-label">ชื่อลูกค้า</label>
                        <input type="text" class="form-control" id="customer_name" name="customer_name" value="{{ task.customer.name or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="customer_phone" class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" class="form-control" id="customer_phone" name="customer_phone" value="{{ task.customer.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">ที่อยู่ลูกค้า</label>
                        <textarea class="form-control" id="address" name="address" rows="3">{{ task.customer.address or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="latitude_longitude" class="form-label">พิกัดแผนที่ (ลิงก์ Google Maps)</label>
                        <input type="url" class="form-control" id="latitude_longitude" name="latitude_longitude" value="{{ task.customer.map_url or '' }}">
                    </div>
                     <div class="mb-3">
                        <label for="detail" class="form-label">รายละเอียดงานเบื้องต้น</label>
                        <textarea class="form-control" id="detail" name="detail" rows="4">{{ task.customer.detail or '' }}</textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{{ url_for('update_task_details', task_id=task.id) }}" class="btn btn-secondary">ยกเลิก</a>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>บันทึกข้อมูลลูกค้า</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
